name: Serenity Daily Push

on:
  schedule:
    # 8:57 AM Beijing time = 0:57 AM UTC
    - cron: "57 0 * * *"
  workflow_dispatch:  # manual trigger

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python push.py
        env:
          SCT_SENDKEY: ${{ secrets.SCT_SENDKEY }}